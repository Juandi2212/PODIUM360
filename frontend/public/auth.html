<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Podium 360 — Acceso</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bebas Neue"', "system-ui", "sans-serif"],
            body: ['"Barlow Condensed"', "system-ui", "sans-serif"],
          },
          colors: {
            podium: {
              bg: "#050716", card: "#13162b", border: "#1e2340",
              gold: "#f5bc2f", green: "#25d466", red: "#f04444",
              text: "#e8eef8", muted: "#8090b0",
            },
          },
          boxShadow: {
            "podium-glow": "0 0 40px rgba(37,212,102,0.15)",
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: "Barlow Condensed", system-ui, sans-serif; }
    /* Animated Gradient Background */
    .bg-animated {
      background: linear-gradient(-45deg, #050716, #0a0d20, #0d1a12, #050716);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>

<body class="min-h-screen bg-animated text-podium-text flex items-center justify-center p-4">

  <!-- Grid overlay -->
  <div class="pointer-events-none fixed inset-0 opacity-40 mix-blend-screen" aria-hidden="true">
    <div class="absolute inset-0 bg-[linear-gradient(to_right,rgba(255,255,255,0.03)_1px,transparent_1px),linear-gradient(to_bottom,rgba(255,255,255,0.03)_1px,transparent_1px)] bg-[size:60px_60px]"></div>
  </div>

  <div class="w-full max-w-md relative z-10">
    <!-- Logo -->
    <div class="flex flex-col items-center justify-center mb-10 gap-2">
      <div class="flex h-12 w-12 items-center justify-center rounded-xl border border-emerald-400/40 bg-black/40 shadow-[0_0_25px_rgba(37,212,102,0.55)]">
        <span class="font-display text-2xl tracking-[0.18em] text-podium-green">P</span>
      </div>
      <div class="text-center mt-3">
        <h1 class="font-display text-2xl leading-none tracking-[0.20em] text-podium-text">PODIUM 360</h1>
        <p class="text-[11px] uppercase tracking-[0.26em] text-podium-muted mt-1">SaaS de Auditoría EV</p>
      </div>
    </div>

    <!-- Auth Card -->
    <div class="rounded-2xl border border-podium-border/80 bg-black/60 backdrop-blur-md p-8 shadow-podium-glow">
      
      <!-- Tabs -->
      <div class="flex border-b border-podium-border mb-6">
        <button id="tab-login" class="flex-1 pb-3 text-sm uppercase tracking-[0.2em] font-semibold text-podium-green border-b-2 border-podium-green transition" onclick="switchTab('login')">Ingresar</button>
        <button id="tab-register" class="flex-1 pb-3 text-sm uppercase tracking-[0.2em] font-semibold text-podium-muted border-b-2 border-transparent hover:text-podium-text transition" onclick="switchTab('register')">Crear Cuenta</button>
      </div>

      <!-- Error Box -->
      <div id="error-box" class="hidden mb-4 rounded-lg bg-red-900/30 border border-red-500/30 p-3 text-sm text-red-200"></div>
      
      <!-- Success Box -->
      <div id="success-box" class="hidden mb-4 rounded-lg bg-green-900/30 border border-emerald-400/30 p-3 text-sm text-emerald-200"></div>

      <!-- Form -->
      <form id="auth-form" class="space-y-5" onsubmit="handleAuth(event)">
        
        <!-- Email -->
        <div>
          <label class="block text-[11px] uppercase tracking-[0.2em] text-podium-muted mb-1.5">Correo Electrónico</label>
          <input type="email" id="email" required
            class="w-full rounded-lg border border-podium-border/80 bg-podium-bg/80 px-4 py-2.5 text-sm text-podium-text placeholder-podium-muted/40 focus:border-podium-green focus:outline-none focus:ring-1 focus:ring-podium-green transition"
            placeholder="usuario@email.com">
        </div>

        <!-- Password -->
        <div>
          <label class="block text-[11px] uppercase tracking-[0.2em] text-podium-muted mb-1.5">Contraseña</label>
          <input type="password" id="password" required minlength="6"
            class="w-full rounded-lg border border-podium-border/80 bg-podium-bg/80 px-4 py-2.5 text-sm text-podium-text placeholder-podium-muted/40 focus:border-podium-green focus:outline-none focus:ring-1 focus:ring-podium-green transition"
            placeholder="••••••••">
        </div>

        <!-- Submit -->
        <button type="submit" id="submit-btn"
          class="w-full rounded-lg bg-podium-green py-3 mt-2 text-sm font-semibold uppercase tracking-[0.22em] text-black shadow-lg shadow-podium-green/20 transition hover:bg-emerald-300 flex items-center justify-center">
          Ingresar al Dashboard
        </button>
      </form>

    </div>

    <div class="text-center mt-6">
      <a href="index.html" class="text-[11px] uppercase tracking-[0.22em] text-podium-muted hover:text-podium-text transition">← Volver a la página principal</a>
    </div>
  </div>

  <!-- Shared Supabase Config -->
  <script src="js/config.js"></script>
  
  <script>
    let mode = 'login'; // 'login' or 'register'
    const sb = getSupabase();

    // Check if already logged in
    window.addEventListener('load', async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        window.location.href = 'dashboard.html';
      }
    });

    function switchTab(newMode) {
      mode = newMode;
      const tLogin = document.getElementById('tab-login');
      const tReg = document.getElementById('tab-register');
      const btn = document.getElementById('submit-btn');
      
      // Clear messages
      document.getElementById('error-box').classList.add('hidden');
      document.getElementById('success-box').classList.add('hidden');

      if (mode === 'login') {
        tLogin.className = "flex-1 pb-3 text-sm uppercase tracking-[0.2em] font-semibold text-podium-green border-b-2 border-podium-green transition";
        tReg.className = "flex-1 pb-3 text-sm uppercase tracking-[0.2em] font-semibold text-podium-muted border-b-2 border-transparent hover:text-podium-text transition";
        btn.textContent = "Ingresar al Dashboard";
      } else {
        tReg.className = "flex-1 pb-3 text-sm uppercase tracking-[0.2em] font-semibold text-podium-green border-b-2 border-podium-green transition";
        tLogin.className = "flex-1 pb-3 text-sm uppercase tracking-[0.2em] font-semibold text-podium-muted border-b-2 border-transparent hover:text-podium-text transition";
        btn.textContent = "Crear Cuenta Gratis";
      }
    }

    function showMsg(type, text) {
      const errBox = document.getElementById('error-box');
      const succBox = document.getElementById('success-box');
      
      errBox.classList.add('hidden');
      succBox.classList.add('hidden');
      
      if (type === 'error') {
        errBox.textContent = text;
        errBox.classList.remove('hidden');
      } else {
        succBox.textContent = text;
        succBox.classList.remove('hidden');
      }
    }

    async function handleAuth(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submit-btn');
      
      if(!email || !password) return;

      btn.disabled = true;
      btn.innerHTML = `<span class="animate-pulse">Procesando...</span>`;

      try {
        if (mode === 'register') {
          const { data, error } = await sb.auth.signUp({ email, password });
          if (error) throw error;
          
          if (data?.user?.identities?.length === 0) {
            throw new Error("Este usuario ya existe.");
          }
          
          showMsg('success', "Cuenta creada exitosamente. Ingresando...");
          setTimeout(() => window.location.href = 'dashboard.html', 1500);

        } else {
          const { data, error } = await sb.auth.signInWithPassword({ email, password });
          if (error) throw error;
          
          showMsg('success', "Acceso concedido...");
          setTimeout(() => window.location.href = 'dashboard.html', 500);
        }
      } catch (err) {
        let msg = err.message;
        if (msg.includes("Invalid login credentials")) msg = "Credenciales incorrectas.";
        if (msg.includes("already registered")) msg = "El usuario ya existe.";
        showMsg('error', msg);
      } finally {
        btn.disabled = false;
        btn.innerHTML = mode === 'login' ? 'Ingresar al Dashboard' : 'Crear Cuenta Gratis';
      }
    }
  </script>
</body>
</html>
