<!DOCTYPE html>
<html lang="es" class="h-full bg-[#0a0f1c]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podium 360 | Terminal de Inteligencia VIP</title>
    <!-- Tailwind CSS (CDN para preview rápido) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            gold: '#ffd700',
                            dark: '#0a0f1c',
                            panel: '#151b2b',
                            accent: '#3b82f6',
                            success: '#10b981'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Supabase JS Client for Frontend -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Estilos VIP Premium y Animaciones */
        body { font-family: 'Inter', sans-serif; color: #f3f4f6; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0f1c; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        
        .gold-gradient-text {
            background: linear-gradient(135deg, #ffd700 0%, #fcd34d 50%, #d97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .vip-card-glow {
            position: relative;
            background: #111827;
            border-radius: 1rem;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .vip-card-glow:hover {
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
            transform: translateY(-2px);
            border: 1px solid rgba(255, 215, 0, 0.4);
        }
        
        /* Efecto destello dorado sutil */
        .vip-card-glow::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 1rem;
            background: linear-gradient(135deg, rgba(255,215,0,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #ffd700;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-full flex flex-col">

    <!-- Navegación -->
    <nav class="bg-brand-panel border-b border-gray-800 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-3">
                    <svg class="w-8 h-8 text-brand-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    <span class="text-xl font-bold tracking-tight text-white">Podium <span class="gold-gradient-text">360</span></span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-400">Jornada Activa</span>
                    <span class="inline-flex items-center bg-green-900/40 text-green-400 text-xs font-semibold px-2.5 py-0.5 rounded-full border border-green-800">
                        <span class="w-2 h-2 mr-1.5 bg-green-500 rounded-full animate-pulse"></span>
                        Live
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- Header Section -->
        <div class="mb-10 text-center sm:text-left">
            <h1 class="text-3xl font-extrabold text-white sm:text-4xl">Terminal de Inteligencia</h1>
            <p class="mt-2 text-lg text-gray-400">Motor predictivo híbrido y análisis narrativo avanzado para toma de decisiones.</p>
        </div>

        <div id="loading-state" class="flex flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-gray-400">Conectando con Supabase y recuperando modelos matemáticos...</p>
        </div>

        <!-- Dashboard Layout -->
        <div id="dashboard-content" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Columna Izquierda: Daily Board (Standard) -->
            <div class="lg:col-span-1 flex flex-col space-y-4">
                <div class="flex items-center justify-between pb-2 border-b border-gray-800">
                    <h2 class="text-xl font-semibold text-white flex items-center">
                        <svg class="w-5 h-5 mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                        Radar 1x2 (Eficientes)
                    </h2>
                    <span id="board-count" class="text-sm font-medium text-gray-400">0 Partidos</span>
                </div>
                
                <!-- Contenedor scrollable para Daily Board -->
                <div id="daily-board-container" class="space-y-3 overflow-y-auto max-h-[800px] pr-2 pb-4">
                    <!-- Las tarjetas se inyectan acá vía JS -->
                </div>
            </div>

            <!-- Columna Derecha/Principal: VIP Signals (Triple Ángulo) -->
            <div class="lg:col-span-2 flex flex-col space-y-4">
                <div class="flex items-center justify-between pb-2 border-b border-brand-gold/30">
                    <h2 class="text-xl font-semibold gold-gradient-text flex items-center shadow-gold">
                        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"></path></svg>
                        Triple Ángulo VIP (EV ≥ 5.0%)
                    </h2>
                    <span id="vip-count" class="text-sm font-medium text-brand-gold bg-brand-gold/10 px-2 py-1 rounded">0 Señales Detectadas</span>
                </div>

                <!-- Contenedor para VIP Signals -->
                <div id="vip-signals-container" class="space-y-6">
                    <!-- Las tarjetas premium se inyectan acá vía JS -->
                </div>
            </div>

        </div>
    </main>

    <script>
        // ==========================================
        // CONFIGURACIÓN SUPABASE
        // IMPORTANTE: Inserta aquí tus llaves públicas.
        // Al tratarse del Frontend, solo la clave ANON pública es segura aquí.
        // ==========================================
        const SUPABASE_URL = 'https://ssvnixnqczpvpiomgrje.supabase.co';
        const SUPABASE_ANON_KEY = 'TU_SUPABASE_ANON_KEY_AQUI'; // Reemplazar con Anon Key real provista por el entorno

        // Fallback Mock Data por si fallan las credenciales (Efecto Demo)
        const MOCK_DATA = {
            board: [
                { local: 'Man City', visitante: 'Arsenal', liga: 'Premier League', poisson_1: 45.2, poisson_x: 24.8, poisson_2: 30.0, estado_mercado: 'Mercado Eficiente', xg_diff: 0.8 },
                { local: 'Real Madrid', visitante: 'Barcelona', liga: 'La Liga', poisson_1: 52.1, poisson_x: 22.0, poisson_2: 25.9, estado_mercado: 'Oportunidad Detectada', xg_diff: 1.2 }
            ],
            vips: [
                {
                    local: 'Atalanta', visitante: 'Bayern', liga: 'Champions League', mercado: '1x2_visitante', cuota: 1.68, ev_initial: 11.28,
                    angulo_matematico: 'El modelo (3/3 consenso) arroja una divergencia de -16.55pp. El fair value es radicalmente menor a la cuota vigente.',
                    angulo_tendencia: 'Atalanta acumula un diferencial xG decadente en sus últimos 3 juegos. Bayern mantiene un +1.5 xG puro de visitante.',
                    angulo_contexto: 'Smart Money detectado en las últimas horas en Pinnacle, forzando la línea.'
                }
            ]
        };

        // UI Renders
        function renderDailyBoardCard(item) {
            const isOportunidad = item.estado_mercado === 'Oportunidad Detectada';
            const badgeClass = isOportunidad ? 'bg-blue-900/50 text-blue-400 border border-blue-800' : 'bg-gray-800 text-gray-400';
            
            return `
            <div class="bg-brand-panel p-4 rounded-xl border border-gray-800 hover:border-gray-700 transition">
                <div class="flex justify-between items-start mb-2">
                    <p class="text-xs text-gray-500 font-semibold uppercase tracking-wider">${item.liga || 'Competición'}</p>
                    <span class="text-[10px] font-bold px-2 py-0.5 rounded ${badgeClass}">${item.estado_mercado || 'Eficiente'}</span>
                </div>
                <h3 class="text-sm font-bold text-gray-200 mb-3">${item.local} vs ${item.visitante}</h3>
                
                <div class="grid grid-cols-3 gap-2 mt-2 bg-gray-900/50 p-2 rounded-lg text-center">
                    <div>
                        <p class="text-[10px] text-gray-500">Local (1)</p>
                        <p class="text-sm font-semibold text-gray-300">${item.poisson_1 || '--'}%</p>
                    </div>
                    <div class="border-x border-gray-800">
                        <p class="text-[10px] text-gray-500">Empate (X)</p>
                        <p class="text-sm font-semibold text-gray-300">${item.poisson_x || '--'}%</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-500">Visita (2)</p>
                        <p class="text-sm font-semibold text-gray-300">${item.poisson_2 || '--'}%</p>
                    </div>
                </div>
                <div class="mt-3 flex justify-between items-center text-xs text-gray-400">
                    <span>xG Rolling Diff: </span>
                    <span class="font-mono bg-black/30 px-1 py-0.5 rounded text-gray-300">${item.xg_diff > 0 ? '+'+item.xg_diff : item.xg_diff}</span>
                </div>
            </div>`;
        }

        function renderVipSignalCard(item) {
            const evColor = parseFloat(item.ev_initial) >= 8.0 ? 'text-green-400' : 'text-brand-gold';
            
            return `
            <div class="vip-card-glow p-6">
                <!-- Header VIP -->
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6">
                    <div>
                        <div class="flex items-center space-x-2 mb-1">
                            <span class="bg-brand-gold text-black text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">Premium Signal</span>
                            <span class="text-xs text-gray-500 font-semibold uppercase">${item.liga || 'Competición'}</span>
                        </div>
                        <h3 class="text-xl font-bold text-white">${item.local} vs ${item.visitante}</h3>
                    </div>
                    <div class="mt-4 sm:mt-0 flex items-center space-x-4 bg-gray-900/60 py-2 px-4 rounded-lg border border-gray-800">
                        <div class="text-center">
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Mercado</p>
                            <p class="text-sm font-bold text-gray-200 capitalize">${(item.mercado||'').replace('_', ' ')}</p>
                        </div>
                        <div class="w-px h-8 bg-gray-700"></div>
                        <div class="text-center">
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Cuota</p>
                            <p class="text-sm font-bold text-white">${item.cuota || '--'}</p>
                        </div>
                        <div class="w-px h-8 bg-gray-700"></div>
                        <div class="text-center">
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Valor (EV)</p>
                            <p class="text-lg font-extrabold ${evColor}">+${item.ev_initial}%</p>
                        </div>
                    </div>
                </div>

                <!-- Triple Ángulo (3 Columnas) -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6 pt-6 border-t border-gray-800/80">
                    <!-- ÁNGULO 1 -->
                    <div>
                        <div class="flex items-center mb-2">
                            <div class="w-6 h-6 rounded bg-blue-900/30 flex items-center justify-center mr-2 ring-1 ring-blue-500/30">
                                <svg class="w-3.5 h-3.5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                            </div>
                            <h4 class="text-sm font-bold text-gray-300">Modelo Matemático</h4>
                        </div>
                        <p class="text-sm text-gray-400 leading-relaxed">${item.angulo_matematico || 'Pendiente de generación por Claude IA.'}</p>
                    </div>
                    
                    <!-- ÁNGULO 2 -->
                    <div>
                        <div class="flex items-center mb-2">
                            <div class="w-6 h-6 rounded bg-purple-900/30 flex items-center justify-center mr-2 ring-1 ring-purple-500/30">
                                <svg class="w-3.5 h-3.5 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                            </div>
                            <h4 class="text-sm font-bold text-gray-300">Tendencia & Data</h4>
                        </div>
                        <p class="text-sm text-gray-400 leading-relaxed">${item.angulo_tendencia || 'Pendiente de generación por Claude IA.'}</p>
                    </div>

                    <!-- ÁNGULO 3 -->
                    <div>
                        <div class="flex items-center mb-2">
                            <div class="w-6 h-6 rounded bg-orange-900/30 flex items-center justify-center mr-2 ring-1 ring-orange-500/30">
                                <svg class="w-3.5 h-3.5 text-orange-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                            <h4 class="text-sm font-bold text-gray-300">Contexto y Riesgo</h4>
                        </div>
                        <p class="text-sm text-gray-400 leading-relaxed">${item.angulo_contexto || 'Pendiente de generación por Claude IA.'}</p>
                    </div>
                </div>
            </div>`;
        }

        async function initDashboard() {
            setTimeout(async () => {
                let boardData = [];
                let vipData = [];

                // Intentar conectar a Supabase real si la API KEY está configurada en la variable SUPABASE_ANON_KEY 
                // (Para efectos de demostración pura en Local HTML, usaremos Mocks si falla).
                try {
                    // Crearlo sin throw duro
                    if(SUPABASE_ANON_KEY !== "TU_SUPABASE_ANON_KEY_AQUI") {
                        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        const { data: dbBoard, error: err1 } = await supabase.from('daily_board').select('*');
                        const { data: dbVip, error: err2 } = await supabase.from('vip_signals').select('*');
                        
                        if(!err1 && !err2 && dbBoard && dbVip) {
                            boardData = dbBoard;
                            vipData = dbVip;
                        } else { throw new Error("Fetch error"); }
                    } else { throw new Error("No real key provided"); }
                } catch(e) {
                    console.log("Cargando datos locales simulados (MOCK) para preview...");
                    boardData = MOCK_DATA.board;
                    vipData = MOCK_DATA.vips;
                }

                // Inject data to UI
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('dashboard-content').classList.remove('hidden');

                const boardContainer = document.getElementById('daily-board-container');
                const vipContainer = document.getElementById('vip-signals-container');
                
                document.getElementById('board-count').innerText = `${boardData.length} Partidos`;
                document.getElementById('vip-count').innerText = `${vipData.length} Señales Detectadas`;

                if(boardData.length > 0) {
                    boardContainer.innerHTML = boardData.map(b => renderDailyBoardCard(b)).join('');
                } else {
                    boardContainer.innerHTML = `<p class="text-sm text-gray-500 italic p-4">No hay partidos procesados hoy.</p>`;
                }

                if(vipData.length > 0) {
                    vipContainer.innerHTML = vipData.map(v => renderVipSignalCard(v)).join('');
                } else {
                    vipContainer.innerHTML = `
                    <div class="bg-gray-800/20 border border-gray-800 rounded-xl p-8 text-center">
                        <svg class="w-12 h-12 text-gray-600 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
                        <p class="text-gray-400">El modelo no detectó ninguna ineficiencia >5.0% el día de hoy.</p>
                        <p class="text-xs text-gray-500 mt-1">Regla de Oro Podium protegiendo el bankroll.</p>
                    </div>`;
                }
            }, 800);
        }

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
